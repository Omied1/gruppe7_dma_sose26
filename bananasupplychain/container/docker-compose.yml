version: "3.9"

services:

  # =========================
  # POSTGRESQL
  # =========================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logistics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 1g
    pids_limit: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # MONGODB (FIXED OPTION B)
  # =========================
  mongodb:
    image: mongo:7
    container_name: mongodb
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    mem_limit: 512m
    pids_limit: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # REDIS (HART BEGRENZT)
  # =========================
  redis:
    image: redis:7
    container_name: redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
    ports:
      - "6379:6379"
    mem_limit: 256m
    pids_limit: 100
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # =========================
  # NEO4J
  # =========================
  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    mem_limit: 1g
    pids_limit: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # MINIO
  # =========================
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    mem_limit: 512m
    pids_limit: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # CLEANUP JOB (POSTGRES)
  # Loescht tms.shipment_positions aelter als 90 Tage (GPS-Archivbereinigung).
  # Tabellen: tms.shipment_positions (recorded_at < NOW() - 90 days)
  # =========================
  cleanup:
    image: postgres:15
    container_name: cleanup
    depends_on:
      - postgres
    environment:
      PGPASSWORD: password
    entrypoint: >
      bash -c "
      while true; do
        echo 'Cleanup: GPS-Positionen aelter als 90 Tage loeschen...';
        psql -h postgres -U user -d logistics -c \"
          DELETE FROM tms.shipment_positions
          WHERE recorded_at < NOW() - INTERVAL '90 days';
        \";
        sleep 86400;
      done
      "
    mem_limit: 128m
    pids_limit: 50
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  minio_data:
